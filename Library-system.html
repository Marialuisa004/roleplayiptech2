<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAJ — Library Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1612;
    --ink-soft: #4a4540;
    --ink-muted: #8a837a;
    --paper: #faf8f5;
    --paper-warm: #f3efe8;
    --paper-card: #ffffff;
    --amber: #c8821a;
    --amber-light: #f0c97a;
    --amber-pale: #fdf3dc;
    --teal: #1a6b5c;
    --teal-light: #4ca88f;
    --teal-pale: #e0f2ed;
    --coral: #c84c2a;
    --coral-pale: #fdeee9;
    --border: #e4dfd8;
    --shadow-sm: 0 1px 3px rgba(26,22,18,0.06), 0 1px 2px rgba(26,22,18,0.04);
    --shadow-md: 0 4px 16px rgba(26,22,18,0.08), 0 2px 6px rgba(26,22,18,0.06);
    --shadow-lg: 0 12px 40px rgba(26,22,18,0.12), 0 4px 12px rgba(26,22,18,0.08);
    --radius: 12px;
    --radius-sm: 8px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { font-size: 15px; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* === SIDEBAR === */
  .layout { display: flex; min-height: 100vh; }

  .sidebar {
    width: 240px;
    background: var(--ink);
    color: var(--paper);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .sidebar-brand {
    padding: 28px 24px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .brand-icon {
    width: 36px;
    height: 36px;
    background: var(--amber);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 12px;
    font-size: 18px;
  }

  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.01em;
    color: #fff;
  }

  .brand-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    margin-top: 2px;
    font-weight: 400;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .sidebar-nav { padding: 16px 12px; flex: 1; }

  .nav-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    padding: 8px 12px 6px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 14px;
    font-weight: 400;
    color: rgba(255,255,255,0.6);
    transition: all 0.15s;
    margin-bottom: 2px;
    user-select: none;
  }

  .nav-item:hover { background: rgba(255,255,255,0.07); color: #fff; }
  .nav-item.active { background: var(--amber); color: var(--ink); font-weight: 500; }
  .nav-item.active .nav-icon { opacity: 1; }

  .nav-icon { font-size: 16px; opacity: 0.7; width: 20px; text-align: center; }

  .sidebar-footer {
    padding: 16px;
    border-top: 1px solid rgba(255,255,255,0.08);
    font-size: 12px;
    color: rgba(255,255,255,0.3);
  }

  /* === MAIN === */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .topbar {
    background: var(--paper-card);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .page-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--ink);
  }

  .topbar-right { display: flex; align-items: center; gap: 10px; }

  .search-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--paper-warm);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    width: 240px;
    transition: border-color 0.15s;
  }

  .search-bar:focus-within { border-color: var(--amber); }

  .search-bar input {
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    width: 100%;
  }

  .search-bar input::placeholder { color: var(--ink-muted); }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-primary { background: var(--amber); color: var(--ink); }
  .btn-primary:hover { background: #b5741a; transform: translateY(-1px); box-shadow: var(--shadow-sm); }

  .btn-ghost { background: transparent; color: var(--ink-soft); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--paper-warm); }

  .btn-danger { background: var(--coral-pale); color: var(--coral); border: 1px solid transparent; }
  .btn-danger:hover { background: #f5d5cc; }

  /* === CONTENT === */
  .content { flex: 1; padding: 24px 28px; overflow-y: auto; }

  /* === VIEW PAGES === */
  .view { display: none; animation: fadeIn 0.2s ease; }
  .view.active { display: block; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* === STATS === */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--paper-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: var(--shadow-sm);
    position: relative;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }

  .stat-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
    border-radius: 4px 0 0 4px;
  }

  .stat-card.c-amber::after { background: var(--amber); }
  .stat-card.c-teal::after { background: var(--teal); }
  .stat-card.c-coral::after { background: var(--coral); }
  .stat-card.c-ink::after { background: var(--ink); }

  .stat-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 8px; }
  .stat-value { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; color: var(--ink); line-height: 1; }
  .stat-sub { font-size: 12px; color: var(--ink-muted); margin-top: 6px; }

  /* === TABLE === */
  .table-card {
    background: var(--paper-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }

  .table-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    background: var(--paper-warm);
  }

  .table-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
  }

  .table-filters { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .filter-select {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    border: 1px solid var(--border);
    background: var(--paper-card);
    color: var(--ink);
    padding: 6px 10px;
    border-radius: var(--radius-sm);
    outline: none;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .filter-select:focus { border-color: var(--amber); }

  .tbl-wrap { overflow-x: auto; }

  table { width: 100%; border-collapse: collapse; }

  thead th {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--ink-muted);
    padding: 12px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    background: var(--paper-warm);
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    cursor: pointer;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--paper-warm); }

  td {
    padding: 13px 16px;
    font-size: 13px;
    color: var(--ink);
    vertical-align: middle;
  }

  .book-cell { display: flex; flex-direction: column; gap: 2px; }
  .book-name { font-weight: 500; color: var(--ink); font-size: 13px; }
  .book-meta { font-size: 11px; color: var(--ink-muted); }

  .borrower-cell { display: flex; align-items: center; gap: 10px; }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
    flex-shrink: 0;
    font-family: 'DM Mono', monospace;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }

  .badge::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    display: inline-block;
  }

  .badge-borrowed { background: #dff0ff; color: #1060a0; }
  .badge-borrowed::before { background: #1060a0; }
  .badge-returned { background: var(--teal-pale); color: var(--teal); }
  .badge-returned::before { background: var(--teal); }
  .badge-overdue { background: var(--coral-pale); color: var(--coral); }
  .badge-overdue::before { background: var(--coral); }

  .date-mono { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--ink-soft); }
  .date-none { color: var(--ink-muted); font-style: italic; }

  .action-btns { display: flex; gap: 6px; }

  .icon-btn {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    transition: all 0.12s;
    color: var(--ink-soft);
  }

  .icon-btn:hover { background: var(--paper-warm); border-color: var(--amber); color: var(--amber); }
  .icon-btn.delete:hover { background: var(--coral-pale); border-color: var(--coral); color: var(--coral); }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--ink-muted);
  }

  .empty-state .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }
  .empty-state p { font-size: 14px; }

  /* === MODAL === */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(26,22,18,0.55);
    backdrop-filter: blur(3px);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeInBg 0.2s ease;
  }

  .modal-backdrop.open { display: flex; }

  @keyframes fadeInBg { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--paper-card);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    width: 100%;
    max-width: 500px;
    animation: slideUp 0.22s cubic-bezier(0.34,1.4,0.64,1);
    overflow: hidden;
  }

  @keyframes slideUp { from { opacity: 0; transform: translateY(20px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }

  .modal-head {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--paper-warm);
  }

  .modal-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; }

  .modal-close {
    width: 28px; height: 28px;
    border-radius: 6px; border: 1px solid var(--border);
    background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: var(--ink-muted);
    transition: all 0.12s;
  }

  .modal-close:hover { background: var(--coral-pale); color: var(--coral); border-color: var(--coral); }

  .modal-body { padding: 20px 24px; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-grid .span2 { grid-column: 1 / -1; }

  .form-group { display: flex; flex-direction: column; gap: 5px; }

  .form-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }

  .form-input, .form-select {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 11px;
    color: var(--ink);
    background: var(--paper);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    width: 100%;
  }

  .form-input:focus, .form-select:focus {
    border-color: var(--amber);
    box-shadow: 0 0 0 3px rgba(200,130,26,0.12);
  }

  .modal-foot {
    padding: 14px 24px 20px;
    display: flex; gap: 10px; justify-content: flex-end;
    border-top: 1px solid var(--border);
  }

  /* === BOOKS VIEW === */
  .books-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }

  .book-card {
    background: var(--paper-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: pointer;
  }

  .book-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }

  .book-spine {
    height: 8px;
    background: var(--amber);
  }

  .book-card-body { padding: 14px 16px; }

  .book-card-title {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.3;
    margin-bottom: 4px;
  }

  .book-card-author { font-size: 12px; color: var(--ink-muted); margin-bottom: 10px; }

  .book-card-footer {
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 11px;
  }

  .availability { font-weight: 600; }
  .avail-yes { color: var(--teal); }
  .avail-no { color: var(--coral); }

  /* === MEMBERS VIEW === */
  .members-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }

  .member-card {
    background: var(--paper-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--shadow-sm);
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .member-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }

  .member-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .member-avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; font-family: 'DM Mono', monospace; }
  .member-name { font-weight: 500; font-size: 14px; color: var(--ink); }
  .member-id { font-size: 11px; color: var(--ink-muted); font-family: 'DM Mono', monospace; }
  .member-stats { display: flex; gap: 12px; }
  .member-stat { flex: 1; background: var(--paper-warm); border-radius: var(--radius-sm); padding: 8px 10px; text-align: center; }
  .member-stat-val { font-size: 18px; font-weight: 600; font-family: 'Playfair Display', serif; color: var(--ink); }
  .member-stat-label { font-size: 10px; color: var(--ink-muted); margin-top: 2px; }

  /* === TOAST === */
  .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }

  .toast {
    background: var(--ink);
    color: #fff;
    padding: 10px 16px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 400;
    box-shadow: var(--shadow-md);
    animation: toastIn 0.25s cubic-bezier(0.34,1.4,0.64,1);
    display: flex; align-items: center; gap: 8px;
    min-width: 220px;
    max-width: 320px;
  }

  .toast.success { background: var(--teal); }
  .toast.error { background: var(--coral); }

  @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

  /* === RESPONSIVE === */
  @media (max-width: 900px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .sidebar { width: 200px; }
  }

  @media (max-width: 640px) {
    .sidebar { display: none; }
    .topbar { padding: 0 16px; }
    .content { padding: 16px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .form-grid { grid-template-columns: 1fr; }
    .form-grid .span2 { grid-column: auto; }
  }

  /* Tag / category chip */
  .chip {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.05em;
    background: var(--paper-warm);
    color: var(--ink-soft);
    border: 1px solid var(--border);
  }
</style>
</head>
<body>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">📚</div>
      <div class="brand-name">NAJ</div>
      <div class="brand-sub">Library System</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-label">Menu</div>
      <div class="nav-item active" onclick="showView('dashboard', this)">
        <span class="nav-icon">⊞</span> Dashboard
      </div>
      <div class="nav-item" onclick="showView('loans', this)">
        <span class="nav-icon">↔</span> Loan Records
      </div>
      <div class="nav-item" onclick="showView('books', this)">
        <span class="nav-icon">▣</span> Books
      </div>
      <div class="nav-item" onclick="showView('members', this)">
        <span class="nav-icon">◎</span> Members
      </div>
      <div style="margin-top:12px;"></div>
      <div class="nav-label">Actions</div>
      <div class="nav-item" onclick="openBorrowModal()">
        <span class="nav-icon">＋</span> New Loan
      </div>
    </nav>
    <div class="sidebar-user" id="sidebarUser" style="padding:14px 16px;border-top:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:10px;">
      <div id="sidebarAvatar" style="width:34px;height:34px;border-radius:50%;background:var(--amber);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;"></div>
      <div style="flex:1;min-width:0;">
        <div id="sidebarName" style="font-size:12px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Guest</div>
        <div id="sidebarRole" style="font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:0.05em;"></div>
      </div>
      <button onclick="doLogout()" title="Sign out" style="background:rgba(255,255,255,0.07);border:none;color:rgba(255,255,255,0.5);width:26px;height:26px;border-radius:6px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;" onmouseover="this.style.background='rgba(200,76,42,0.25)';this.style.color='#f09595'" onmouseout="this.style.background='rgba(255,255,255,0.07)';this.style.color='rgba(255,255,255,0.5)'">⏻</button>
    </div>
    <div class="sidebar-footer">v1.0 &nbsp;·&nbsp; Static Demo</div>
  </aside>

  <div class="main">
    <!-- TOPBAR -->
    <header class="topbar">
      <div class="page-title" id="pageTitle">Dashboard</div>
      <div class="topbar-right">
        <div class="search-bar">
          <span style="color:var(--ink-muted);font-size:14px">⌕</span>
          <input type="text" id="globalSearch" placeholder="Search records..." oninput="applySearch()">
        </div>
        <div id="userPill" style="display:flex;align-items:center;gap:8px;background:var(--paper-warm);border:1px solid var(--border);border-radius:8px;padding:6px 12px;cursor:default;">
          <span id="userPillIcon" style="font-size:14px;line-height:1">👑</span>
          <div style="display:flex;flex-direction:column;gap:1px;">
            <span id="userPillName" style="font-size:12px;font-weight:500;color:var(--ink);line-height:1;">Admin</span>
            <span id="userPillRole" style="font-size:10px;color:var(--ink-muted);line-height:1;letter-spacing:0.04em;text-transform:uppercase;"></span>
          </div>
        </div>
        <button class="btn btn-primary" onclick="openBorrowModal()" id="newLoanBtn">＋ New Loan</button>
      </div>
    </header>

    <div class="content">

      <!-- ===== DASHBOARD ===== -->
      <div class="view active" id="view-dashboard">
        <div class="stats-grid" id="statsGrid"></div>

        <div class="table-card">

<script>
// ===== STATIC DATA =====
const MEMBERS = [
  { id: 'M001', name: 'Maria Santos',    color: '#dff0ff', text: '#1060a0' },
  { id: 'M002', name: 'Juan dela Cruz',  color: '#e0f2ed', text: '#0f6e56' },
  { id: 'M003', name: 'Ana Reyes',       color: '#fdf3dc', text: '#8a5a00' },
  { id: 'M004', name: 'Carlos Mendoza',  color: '#fdeee9', text: '#993c1d' },
  { id: 'M005', name: 'Rosa Garcia',     color: '#f0eaff', text: '#5c3aa0' },
  { id: 'M006', name: 'Ben Torres',      color: '#e0f2ed', text: '#0f6e56' },
  { id: 'M007', name: 'Lea Villanueva',  color: '#fdf3dc', text: '#8a5a00' },
  { id: 'M008', name: 'Mike Bautista',   color: '#dff0ff', text: '#1060a0' },

  { id: 'M010', name: 'Alex Navarro',    color: '#f0eaff', text: '#5c3aa0' },
];

const BOOKS = [
  { id: 'B001', title: 'To Kill a Mockingbird', author: 'Harper Lee',        category: 'Fiction',     isbn: '978-0061935466' },
  { id: 'B002', title: 'The Great Gatsby',       author: 'F. Scott Fitzgerald', category: 'Classic',  isbn: '978-0743273565' },
  { id: 'B003', title: '1984',                   author: 'George Orwell',     category: 'Dystopian',   isbn: '978-0451524935' },
  { id: 'B004', title: 'Sapiens',                author: 'Yuval Noah Harari', category: 'Non-Fiction', isbn: '978-0062316097' },
  { id: 'B005', title: 'The Alchemist',          author: 'Paulo Coelho',      category: 'Fiction',     isbn: '978-0062315007' },
  { id: 'B006', title: 'Educated',               author: 'Tara Westover',     category: 'Memoir',      isbn: '978-0399590504' },
  { id: 'B007', title: 'Atomic Habits',          author: 'James Clear',       category: 'Self-Help',   isbn: '978-0735211292' },
  { id: 'B008', title: 'Dune',                   author: 'Frank Herbert',     category: 'Sci-Fi',      isbn: '978-0441013593' },
  { id: 'B009', title: 'The Catcher in the Rye', author: 'J.D. Salinger',     category: 'Classic',     isbn: '978-0316769174' },
  { id: 'B010', title: 'The Hobbit',             author: 'J.R.R. Tolkien',    category: 'Fantasy',     isbn: '978-0547928227' },
  { id: 'B011', title: 'Becoming',               author: 'Michelle Obama',    category: 'Memoir',      isbn: '978-1524763138' },
  { id: 'B012', title: 'Brave New World',        author: 'Aldous Huxley',     category: 'Dystopian',   isbn: '978-0060850524' },
  { id: 'B013', title: 'Thinking, Fast and Slow',author: 'Daniel Kahneman',   category: 'Non-Fiction', isbn: '978-0374533557' },
  { id: 'B014', title: 'The Midnight Library',   author: 'Matt Haig',         category: 'Fiction',     isbn: '978-0525559474' },
  { id: 'B015', title: 'The Power of Now',       author: 'Eckhart Tolle',     category: 'Self-Help',   isbn: '978-1577314806' },
];

let LOANS = [
  { id: 1, bookId:'B001', memberId:'M001', borrowDate:'2025-03-01', dueDate:'2025-03-15', returnDate:'2025-03-14', status:'Returned' },
  { id: 2, bookId:'B002', memberId:'M002', borrowDate:'2025-03-10', dueDate:'2025-03-24', returnDate:null,         status:'Borrowed' },
  { id: 3, bookId:'B003', memberId:'M003', borrowDate:'2025-02-20', dueDate:'2025-03-06', returnDate:null,         status:'Overdue'  },
  { id: 4, bookId:'B004', memberId:'M004', borrowDate:'2025-03-05', dueDate:'2025-03-19', returnDate:'2025-03-20', status:'Returned' },
  { id: 5, bookId:'B005', memberId:'M005', borrowDate:'2025-03-12', dueDate:'2025-03-26', returnDate:null,         status:'Borrowed' },
  { id: 6, bookId:'B006', memberId:'M006', borrowDate:'2025-02-15', dueDate:'2025-03-01', returnDate:null,         status:'Overdue'  },
  { id: 7, bookId:'B007', memberId:'M007', borrowDate:'2025-03-08', dueDate:'2025-03-22', returnDate:'2025-03-21', status:'Returned' },
  { id: 8, bookId:'B008', memberId:'M008', borrowDate:'2025-03-14', dueDate:'2025-03-28', returnDate:null,         status:'Borrowed' },
  { id: 9, bookId:'B009', memberId:'M009', borrowDate:'2025-02-10', dueDate:'2025-02-24', returnDate:'2025-02-23', status:'Returned' },
  { id:10, bookId:'B010', memberId:'M010', borrowDate:'2025-03-15', dueDate:'2025-03-29', returnDate:null,         status:'Borrowed' },
  { id:11, bookId:'B011', memberId:'M001', borrowDate:'2025-03-02', dueDate:'2025-03-16', returnDate:'2025-03-16', status:'Returned' },
  { id:12, bookId:'B012', memberId:'M002', borrowDate:'2025-03-11', dueDate:'2025-03-25', returnDate:null,         status:'Borrowed' },
  { id:13, bookId:'B013', memberId:'M003', borrowDate:'2025-02-25', dueDate:'2025-03-11', returnDate:null,         status:'Overdue'  },
  { id:14, bookId:'B014', memberId:'M004', borrowDate:'2025-03-06', dueDate:'2025-03-20', returnDate:null,         status:'Borrowed' },
  { id:15, bookId:'B015', memberId:'M005', borrowDate:'2025-03-06', dueDate:'2025-03-20', returnDate:'2025-03-18', status:'Returned' },
];

let nextId = 16;
let editingId = null;
let currentSearch = '';

// ===== HELPERS =====
const getBook   = id => BOOKS.find(b => b.id === id) || {};
const getMember = id => MEMBERS.find(m => m.id === id) || {};

function fmtDate(d) {
  if (!d) return null;
  const [y, m, day] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[+m-1]} ${+day}, ${y}`;
}

function initials(name) {
  return name.split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();
}

function badgeHTML(s) {
  const cls = s === 'Borrowed' ? 'badge-borrowed' : s === 'Returned' ? 'badge-returned' : 'badge-overdue';
  return `<span class="badge ${cls}">${s}</span>`;
}

function avatarHTML(member, size=30) {
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:${member.color};color:${member.text}">${initials(member.name)}</div>`;
}

function borrowerCell(member) {
  return `<div class="borrower-cell">${avatarHTML(member)}<span>${member.name}</span></div>`;
}

function actionBtns(id, status) {
  const markBtn = status !== 'Returned'
    ? `<button class="icon-btn" title="Mark returned" onclick="markReturned(${id},event)">✓</button>` : '';
  return `<div class="action-btns">
    ${markBtn}
    <button class="icon-btn" title="Edit" onclick="openEditModal(${id},event)">✎</button>
    <button class="icon-btn delete" title="Delete" onclick="deleteLoan(${id},event)">✕</button>
  </div>`;
}

function filteredLoans(extraStatus) {
  const q = currentSearch.toLowerCase();
  return LOANS.filter(l => {
    const b = getBook(l.bookId);
    const m = getMember(l.memberId);
    const matchQ = !q || b.title?.toLowerCase().includes(q) || m.name?.toLowerCase().includes(q) || b.author?.toLowerCase().includes(q);
    const matchStatus = !extraStatus || extraStatus === 'all' || l.status === extraStatus;
    return matchQ && matchStatus;
  });
}

// ===== STATS =====
function renderStats() {
  const total = LOANS.length;
  const borrowed = LOANS.filter(l => l.status === 'Borrowed').length;
  const returned = LOANS.filter(l => l.status === 'Returned').length;
  const overdue  = LOANS.filter(l => l.status === 'Overdue').length;
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card c-ink">
      <div class="stat-label">Total Loans</div>
      <div class="stat-value">${total}</div>
      <div class="stat-sub">${BOOKS.length} books · ${MEMBERS.length} members</div>
    </div>
    <div class="stat-card c-amber">
      <div class="stat-label">Currently Borrowed</div>
      <div class="stat-value" style="color:var(--amber)">${borrowed}</div>
      <div class="stat-sub">Active checkouts</div>
    </div>
    <div class="stat-card c-teal">
      <div class="stat-label">Returned</div>
      <div class="stat-value" style="color:var(--teal)">${returned}</div>
      <div class="stat-sub">Successfully returned</div>
    </div>
    <div class="stat-card c-coral">
      <div class="stat-label">Overdue</div>
      <div class="stat-value" style="color:var(--coral)">${overdue}</div>
      <div class="stat-sub">Past due date</div>
    </div>
  `;
}

// ===== DASHBOARD TABLE =====
function renderDashTable() {
  const sf = document.getElementById('dashFilter')?.value || 'all';
  const rows = filteredLoans(sf).slice().reverse().slice(0, 20);
  const tbody = document.getElementById('dashTableBody');
  if (!rows.length) { tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">📭</div><p>No records match your search.</p></div></td></tr>`; return; }
  tbody.innerHTML = rows.map(l => {
    const b = getBook(l.bookId), m = getMember(l.memberId);
    return `<tr onclick="openEditModal(${l.id})">
      <td><div class="book-cell"><div class="book-name">${b.title}</div><div class="book-meta">${b.author} · <span class="chip">${b.category}</span></div></div></td>
      <td>${borrowerCell(m)}</td>
      <td><span class="date-mono">${fmtDate(l.borrowDate)||'—'}</span></td>
      <td><span class="date-mono">${fmtDate(l.dueDate)||'—'}</span></td>
      <td>${l.returnDate ? `<span class="date-mono">${fmtDate(l.returnDate)}</span>` : `<span class="date-none">—</span>`}</td>
      <td>${badgeHTML(l.status)}</td>
      <td onclick="event.stopPropagation()">${actionBtns(l.id, l.status)}</td>
    </tr>`;
  }).join('');
}

// ===== LOANS TABLE =====
function renderLoansTable() {
  const sf  = document.getElementById('statusFilter')?.value   || 'all';
  const cf  = document.getElementById('categoryFilter')?.value || 'all';
  const srt = document.getElementById('sortFilter')?.value     || 'newest';

  let rows = filteredLoans(sf).filter(l => cf === 'all' || getBook(l.bookId).category === cf);

  if (srt === 'newest') rows.sort((a,b) => b.id - a.id);
  else if (srt === 'oldest') rows.sort((a,b) => a.id - b.id);
  else if (srt === 'due') rows.sort((a,b) => (a.dueDate||'').localeCompare(b.dueDate||''));
  else if (srt === 'name') rows.sort((a,b) => getBook(a.bookId).title?.localeCompare(getBook(b.bookId).title||''));

  const lc = document.getElementById('loanCount');
  if (lc) lc.textContent = `(${rows.length})`;

  const tbody = document.getElementById('loansTableBody');
  if (!rows.length) { tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">📭</div><p>No records found.</p></div></td></tr>`; return; }

  tbody.innerHTML = rows.map((l, i) => {
    const b = getBook(l.bookId), m = getMember(l.memberId);
    return `<tr onclick="openEditModal(${l.id})">
      <td style="color:var(--ink-muted);font-family:'DM Mono',monospace;font-size:11px">${String(i+1).padStart(2,'0')}</td>
      <td><div class="book-cell"><div class="book-name">${b.title}</div><div class="book-meta">${b.author} · <span class="chip">${b.category}</span></div></div></td>
      <td>${borrowerCell(m)}</td>
      <td><span class="date-mono">${fmtDate(l.borrowDate)||'—'}</span></td>
      <td><span class="date-mono">${fmtDate(l.dueDate)||'—'}</span></td>
      <td>${l.returnDate ? `<span class="date-mono">${fmtDate(l.returnDate)}</span>` : `<span class="date-none">—</span>`}</td>
      <td>${badgeHTML(l.status)}</td>
      <td onclick="event.stopPropagation()">${actionBtns(l.id, l.status)}</td>
    </tr>`;
  }).join('');
}

// ===== BOOKS VIEW =====
function renderBooks() {
  const cf = document.getElementById('bookCatFilter')?.value || 'all';
  const q  = currentSearch.toLowerCase();
  let books = BOOKS.filter(b => (cf === 'all' || b.category === cf) && (!q || b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q)));
  const bc = document.getElementById('bookCount');
  if (bc) bc.textContent = `${books.length} books`;

  const SPINE_COLORS = ['#c8821a','#1a6b5c','#c84c2a','#4a60c8','#8a3aa0','#1a6b8a'];
  document.getElementById('booksGrid').innerHTML = books.map((b, i) => {
    const activeLoan = LOANS.find(l => l.bookId === b.id && l.status !== 'Returned');
    const borrower = activeLoan ? getMember(activeLoan.memberId) : null;
    return `<div class="book-card" onclick="filterByBook('${b.id}')">
      <div class="book-spine" style="background:${SPINE_COLORS[i%SPINE_COLORS.length]}"></div>
      <div class="book-card-body">
        <div class="book-card-title">${b.title}</div>
        <div class="book-card-author">${b.author}</div>
        <div class="book-card-footer">
          <span class="chip">${b.category}</span>
          <span class="availability ${borrower ? 'avail-no' : 'avail-yes'}">${borrower ? 'On Loan' : 'Available'}</span>
        </div>
        ${borrower ? `<div style="margin-top:10px;font-size:11px;color:var(--ink-muted)">Borrowed by <strong>${borrower.name}</strong></div>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ===== MEMBERS VIEW =====
function renderMembers() {
  document.getElementById('membersGrid').innerHTML = MEMBERS.map(m => {
    const total    = LOANS.filter(l => l.memberId === m.id).length;
    const active   = LOANS.filter(l => l.memberId === m.id && l.status === 'Borrowed').length;
    const overdue  = LOANS.filter(l => l.memberId === m.id && l.status === 'Overdue').length;
    return `<div class="member-card">
      <div class="member-header">
        <div class="member-avatar" style="background:${m.color};color:${m.text};width:42px;height:42px">${initials(m.name)}</div>
        <div><div class="member-name">${m.name}</div><div class="member-id">${m.id}</div></div>
      </div>
      <div class="member-stats">
        <div class="member-stat"><div class="member-stat-val">${total}</div><div class="member-stat-label">Total</div></div>
        <div class="member-stat"><div class="member-stat-val" style="color:var(--amber)">${active}</div><div class="member-stat-label">Active</div></div>
        <div class="member-stat"><div class="member-stat-val" style="color:var(--coral)">${overdue}</div><div class="member-stat-label">Overdue</div></div>
      </div>
    </div>`;
  }).join('');
}

// ===== POPULATE FILTERS =====
function populateFilters() {
  const cats = [...new Set(BOOKS.map(b => b.category))].sort();

  ['categoryFilter','bookCatFilter'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const cur = el.value;
    while (el.options.length > 1) el.remove(1);
    cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; el.appendChild(o); });
    if (cur) el.value = cur;
  });

  const fb = document.getElementById('fBook');
  if (fb) { fb.innerHTML = BOOKS.map(b => `<option value="${b.id}">${b.title}</option>`).join(''); }

  const fm = document.getElementById('fBorrower');
  if (fm) { fm.innerHTML = MEMBERS.map(m => `<option value="${m.id}">${m.name}</option>`).join(''); }
}

// ===== SEARCH =====
function applySearch() {
  currentSearch = document.getElementById('globalSearch').value;
  const view = document.querySelector('.view.active')?.id;
  if (view === 'view-dashboard') renderDashTable();
  else if (view === 'view-loans') renderLoansTable();
  else if (view === 'view-books') renderBooks();
}

// ===== NAVIGATION =====
function showView(name, el) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  if (el) el.classList.add('active');

  const titles = { dashboard:'Dashboard', loans:'Loan Records', books:'Books', members:'Members' };
  document.getElementById('pageTitle').textContent = titles[name] || name;

  if (name === 'dashboard') { renderStats(); renderDashTable(); }
  else if (name === 'loans') renderLoansTable();
  else if (name === 'books') renderBooks();
  else if (name === 'members') renderMembers();
}

function filterByBook(bookId) {
  showView('loans', document.querySelectorAll('.nav-item')[1]);
  document.querySelectorAll('.nav-item')[1].classList.add('active');
  currentSearch = getBook(bookId).title || '';
  document.getElementById('globalSearch').value = currentSearch;
  renderLoansTable();
}

// ===== MODAL =====
function openBorrowModal() {
  if (!checkPerm('add')) return;
  editingId = null;
  document.getElementById('modalTitle').textContent = 'New Loan';
  populateFilters();
  const today = new Date().toISOString().split('T')[0];
  const due   = new Date(Date.now() + 14*86400000).toISOString().split('T')[0];
  document.getElementById('fBorrowDate').value = today;
  document.getElementById('fDueDate').value = due;
  document.getElementById('fReturnDate').value = '';
  document.getElementById('fStatus').value = 'Borrowed';
  document.getElementById('modalBackdrop').classList.add('open');
}

function openEditModal(id, e) {
  if (e) e.stopPropagation();
  editingId = id;
  const l = LOANS.find(x => x.id === id);
  if (!l) return;
  document.getElementById('modalTitle').textContent = 'Edit Loan';
  populateFilters();
  document.getElementById('fBook').value       = l.bookId;
  document.getElementById('fBorrower').value   = l.memberId;
  document.getElementById('fBorrowDate').value = l.borrowDate || '';
  document.getElementById('fDueDate').value    = l.dueDate || '';
  document.getElementById('fReturnDate').value = l.returnDate || '';
  document.getElementById('fStatus').value     = l.status;
  document.getElementById('modalBackdrop').classList.add('open');
}

function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('open');
}

function closeModalOnBackdrop(e) {
  if (e.target === document.getElementById('modalBackdrop')) closeModal();
}

function saveLoan() {
  if (editingId === null && !checkPerm('add')) return;
  if (editingId !== null && !checkPerm('edit')) return;
  const bookId     = document.getElementById('fBook').value;
  const memberId   = document.getElementById('fBorrower').value;
  const borrowDate = document.getElementById('fBorrowDate').value;
  const dueDate    = document.getElementById('fDueDate').value;
  const returnDate = document.getElementById('fReturnDate').value || null;
  const status     = document.getElementById('fStatus').value;

  if (!bookId || !memberId || !borrowDate || !dueDate) {
    toast('Please fill in all required fields.', 'error');
    return;
  }

  if (editingId !== null) {
    const idx = LOANS.findIndex(l => l.id === editingId);
    if (idx >= 0) LOANS[idx] = { ...LOANS[idx], bookId, memberId, borrowDate, dueDate, returnDate, status };
    toast('Loan record updated.', 'success');
  } else {
    LOANS.push({ id: nextId++, bookId, memberId, borrowDate, dueDate, returnDate, status });
    toast('New loan added successfully!', 'success');
  }

  closeModal();
  renderAll();
}

function markReturned(id, e) {
  if (!checkPerm('edit')) return;
  if (e) e.stopPropagation();
  const idx = LOANS.findIndex(l => l.id === id);
  if (idx < 0) return;
  const today = new Date().toISOString().split('T')[0];
  LOANS[idx].status = 'Returned';
  LOANS[idx].returnDate = today;
  toast(`Marked as returned on ${fmtDate(today)}.`, 'success');
  renderAll();
}

function deleteLoan(id, e) {
  if (!checkPerm('delete')) return;
  if (e) e.stopPropagation();
  if (!confirm('Delete this loan record?')) return;
  LOANS = LOANS.filter(l => l.id !== id);
  toast('Record deleted.', 'error');
  renderAll();
}

function renderAll() {
  renderStats();
  renderDashTable();
  renderLoansTable();
  renderBooks();
  renderMembers();
}

// ===== TOAST =====
function toast(msg, type='') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  const icons = { success:'✓', error:'✕', '':'ℹ' };
  t.innerHTML = `<span>${icons[type]||'ℹ'}</span> ${msg}`;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(),300); }, 3000);
}

// ===== SESSION & ROLE =====
const ROLE_CONFIG = {
  admin:   { name:'Administrator',   icon:'\u{1F451}', canEdit:true,  canDelete:true,  canAdd:true  },
  manager: { name:'Library Manager', icon:'\u{1F4CB}', canEdit:true,  canDelete:false, canAdd:true  },
  staff:   { name:'Staff Member',    icon:'\u{1F516}', canEdit:false, canDelete:false, canAdd:false },
};

let currentUser = null;

function loadSession() {
  try {
    const raw = sessionStorage.getItem('libratrack_user');
    if (raw) { currentUser = JSON.parse(raw); }
  } catch(e) {}
  if (!currentUser) {
    currentUser = { username:'Administrator', role:'admin', icon:'\u{1F451}' };
  }
  applyRoleUI();
}

function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

function applyRoleUI() {
  const cfg = ROLE_CONFIG[currentUser.role] || ROLE_CONFIG.admin;
  document.getElementById('sidebarAvatar').textContent = currentUser.icon;
  document.getElementById('sidebarName').textContent   = currentUser.username;
  document.getElementById('sidebarRole').textContent   = cfg.name;
  document.getElementById('userPillIcon').textContent  = currentUser.icon;
  document.getElementById('userPillName').textContent  = currentUser.username;
  document.getElementById('userPillRole').textContent  = capitalize(currentUser.role);
  const newBtn = document.getElementById('newLoanBtn');
  if (newBtn) newBtn.style.display = cfg.canAdd ? '' : 'none';
}

function doLogout() {
  if (!confirm('Sign out of LibraTrack?')) return;
  sessionStorage.removeItem('libratrack_user');
  window.location.href = 'login.html';
}

function checkPerm(action) {
  const cfg = ROLE_CONFIG[currentUser && currentUser.role] || ROLE_CONFIG.admin;
  const map = { add: cfg.canAdd, edit: cfg.canEdit, delete: cfg.canDelete };
  if (!map[action]) {
    toast('Your role does not have permission for this action.', 'error');
    return false;
  }
  return true;
}

// ===== INIT =====
(function init() {
  loadSession();
  populateFilters();
  renderStats();
  renderDashTable();
})();
</script>
